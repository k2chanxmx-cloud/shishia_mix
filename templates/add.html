<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>🐻登録🐻</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="manifest" href="/manifest.json">

    <meta name="theme-color" content="#66d6c2">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="えいてぃーちゃん">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <link
        rel="apple-touch-icon"
        href="/static/icons/icon-192.png"
    >

    <script>
        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("/sw.js");
        }
    </script>

    <style>
        body{
            margin:0;
            padding:20px;
            padding-bottom:100px;
            background:#dff7f2;
            font-family:-apple-system,BlinkMacSystemFont,sans-serif;
            color:#333;
        }

        h1{
            text-align:center;
            color:#4d8f87;
            margin-bottom:28px;
            font-size:42px;
        }

        .card{
            background:white;
            border-radius:28px;
            padding:22px;
            margin-bottom:22px;
            box-shadow:0 6px 18px rgba(0,0,0,0.08);
        }

        .section-title{
            color:#4d8f87;
            font-size:24px;
            font-weight:bold;
            margin-bottom:20px;
        }

        input,
        textarea{
            width:100%;
            box-sizing:border-box;
            border:2px solid #d5f0ea;
            border-radius:18px;
            padding:16px;
            font-size:16px;
            margin-bottom:18px;
        }

        textarea{
            min-height:120px;
        }

        button{
            width:100%;
            background:#74d2c1;
            color:white;
            border:none;
            border-radius:18px;
            padding:18px;
            font-size:20px;
            font-weight:bold;
        }

        .flash{
            background:white;
            border-radius:20px;
            padding:18px;
            margin-bottom:20px;
        }

        .star-rating{
            display:flex;
            gap:8px;
            margin-bottom:20px;
        }

        .star-rating span{
            font-size:42px;
            color:#d8d8d8;
            cursor:pointer;
            user-select:none;
            transition:0.15s;
        }

        .star-rating span.active{
            color:#f4b63d;
        }

        .bottom-nav{
            position:fixed;
            left:0;
            right:0;
            bottom:0;
            height:76px;
            background:rgba(255,255,255,0.95);
            backdrop-filter:blur(12px);
            display:flex;
            justify-content:space-around;
            align-items:center;
            border-top:1px solid #ccebe6;
        }

        .nav-item{
            text-decoration:none;
            color:#6d9d96;
            font-weight:bold;
            font-size:15px;
        }

        .active{
            color:#43b8a3;
        }
    </style>
</head>
<body>

<h1>🐻ミックス登録🐻</h1>

{% with messages = get_flashed_messages() %}
    {% if messages %}
        {% for message in messages %}
            <div class="flash">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}
{% endwith %}

<div class="card">

    <div class="section-title">
        画像読込登録
    </div>

    <form action="/add" method="POST" enctype="multipart/form-data">

        <input type="hidden" name="action" value="ocr">

        <input
            type="file"
            name="flavor_card"
            accept="image/*"
            required
        >

        <button type="submit">
            文字起こしする
        </button>

    </form>

</div>

<div class="card">

    <div class="section-title">
        手入力登録
    </div>

    <form action="/add" method="POST">

        <input type="hidden" name="action" value="manual">

        <input
            type="date"
            name="smoked_date"
            value="{{ today }}"
            required
        >

        <textarea
            name="mix_text"
            placeholder="例：ココア／ミント／バニラ"
            required
        ></textarea>

        <input
            type="text"
            name="staff_name"
            placeholder="作ったスタッフ"
        >

        <input
            type="hidden"
            name="rating"
            id="rating-value"
            value="0"
        >

        <div class="star-rating">

            <span onclick="setRating(1)">☆</span>
            <span onclick="setRating(2)">☆</span>
            <span onclick="setRating(3)">☆</span>
            <span onclick="setRating(4)">☆</span>
            <span onclick="setRating(5)">☆</span>

        </div>

        <textarea
            name="memo"
            placeholder="メモ"
        ></textarea>

        <button type="submit">
            保存する
        </button>

    </form>

</div>

<nav class="bottom-nav">
    <a href="/" class="nav-item">履歴</a>
    <a href="/add" class="nav-item active">登録</a>
    <a href="/search" class="nav-item">検索</a>
</nav>

<script>

function setRating(rating){

    document.getElementById("rating-value").value = rating;

    const stars = document.querySelectorAll(".star-rating span");

    stars.forEach((star, index) => {

        if(index < rating){
            star.classList.add("active");
            star.textContent = "★";
        }else{
            star.classList.remove("active");
            star.textContent = "☆";
        }

    });

}

</script>

</body>
</html>
